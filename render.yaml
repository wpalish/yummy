# Деплой Yummy в один клик (Render Blueprint):
#   render.com → New → Blueprint → выбрать репозиторий wpalish/yummy → Apply
# Render сам сгенерирует YUMMY_SECRET_KEY. После деплоя проверь /health и /docs.
# Полная инструкция и апгрейд до персистентной БД — в DEPLOY.md.
databases:
  - name: yummy-db
    plan: free
    databaseName: yummy
    user: yummy

services:
  - type: web
    name: yummy-astana
    runtime: python
    plan: free                    # $0. Минус free: спин-даун через 15 мин простоя
    buildCommand: pip install -r requirements.lock
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --no-server-header
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yummy-db
          property: connectionString
      - key: YUMMY_DB_POOL_MIN
        value: "1"
      - key: YUMMY_DB_POOL_MAX    # умножается на число replicas; не превышай DB budget
        value: "5"
      - key: YUMMY_DB_POOL_TIMEOUT
        value: "5"
      - key: YUMMY_DB_STATEMENT_TIMEOUT_MS
        value: "5000"
      - key: YUMMY_DB_LOCK_TIMEOUT_MS
        value: "2000"
      - key: YUMMY_DB_IDLE_TX_TIMEOUT_MS
        value: "10000"
      - key: YUMMY_ENV            # fail-fast прод-конфига; private API всегда требует JWT
        value: production
      - key: YUMMY_SECRET_KEY     # подпись JWT — Render сгенерирует случайное значение
        generateValue: true
      - key: YUMMY_DATA_KEY       # отдельный AES-256-GCM key material для MFA secrets
        generateValue: true
      - key: YUMMY_CORS_ORIGINS   # с каких доменов фронт ходит в API
        value: https://wpalish.github.io
      - key: YUMMY_ALLOWED_HOSTS  # защита от Host Header Injection
        value: yummy-astana.onrender.com
      - key: YUMMY_MAX_REQUEST_BYTES
        value: "65536"
      - key: YUMMY_PAYMENT_MODE   # каталог запускается, покупки fail-closed до provider
        value: disabled
      - key: STRIPE_CURRENCY
        value: kzt
      - key: YUMMY_EMAIL_MODE     # disabled до подключения Resend; admin может verify вручную
        value: disabled
      - key: YUMMY_PUBLIC_URL
        value: https://yummy-astana.onrender.com
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: yummy-db
    plan: free
    databaseName: yummy
    user: yummy
