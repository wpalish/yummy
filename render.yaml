# Деплой Yummy в один клик:
#   render.com → New → Blueprint → выбрать репозиторий yummy → Apply
#   через ~2 мин будет https://yummy-astana.onrender.com (магазин/партнёр/админ, /docs)
services:
  - type: web
    name: yummy-astana
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
